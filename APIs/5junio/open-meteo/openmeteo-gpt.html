<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>App del Tiempo</title>

    <style>
        .red {
            color: red;
        }

        .blue {
            color: blue;
        }
    </style>
</head>

<body>

    <h1>Buscar el tiempo actual en tu ciudad</h1>

    <input type="search" id="ciudad">
    <button id="btnMostrar">Mostrar Tiempo</button>

    <div id="resultado"></div>

    <script>
        const ciudad = document.getElementById("ciudad");
        const mostrar = document.getElementById("btnMostrar");
        const resultado = document.getElementById("resultado");

        async function obtenerTiempo() {
            try {
                const urlCiudad = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(ciudad.value)}&count=1`;

                const resultadoUrl = await fetch(urlCiudad);
                const datageo = await resultadoUrl.json();

                if (!datageo.results || datageo.results.length === 0) {
                    resultado.textContent = "Ciudad no encontrada";
                    return;
                }

                const lat = datageo.results[0].latitude;
                const lon = datageo.results[0].longitude;

                console.log(lat, lon);

                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,wind_speed_10m`;

                const respuesta = await fetch(url);
                const datos = await respuesta.json();

                console.log(datos);

                const temperatura = datos.current.temperature_2m;
                const viento = datos.current.wind_speed_10m;

                const color = temperatura < 20 ? "blue" : "red";

                resultado.innerHTML = `
                    <p class="${color}">Temperatura: ${temperatura} °C</p>
                    <p>Viento: ${viento} km/h</p>
                `;

            } catch (error) {
                console.error(error);
                resultado.textContent = "Error obteniendo datos";
            }
        }

        mostrar.addEventListener("click", obtenerTiempo);
    </script>

</body>

</html>
