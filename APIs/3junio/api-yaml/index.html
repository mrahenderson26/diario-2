<body>
    <main>

    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"
        integrity="sha512-CSBhVREyzHAjAFfBlIBakjoRUKp5h7VSweP0InR/pAJyptH7peuhCsqAI/snV+TwZmXZqoUklpXp6R6wMnYf5Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>

        const main = document.querySelector('main')
        async function obtenerLibros() {
            const response = await fetch('./biblioteca.yaml')
            let data = await response.text()
            data = await jsyaml.load(data)
            console.log(data)
            data.biblioteca.forEach((item) => {
                const libro = `
            <hr/>
            ${item.titulo}<br/>
            ${item.autor}<br/>
            ${item.genero.join(' - ')}.
            `
                main.innerHTML += libro;
            })

        };
        obtenerLibros();
    </script>
