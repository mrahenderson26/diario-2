<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>React Router + Express Example</title>
  </head>
  <body>
    <!--
      React will put the whole app inside this div.
      main.jsx finds this div with document.getElementById("root").
    -->
    <div id="root"></div>

    <!--
      This loads the React JavaScript entry point.
      Vite understands /src/main.jsx during development.
    -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
